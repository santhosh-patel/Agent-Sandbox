<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Usage Dashboard</title>
  <link rel="icon" type="image/png" href="/icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles/index.css" />
  <link rel="stylesheet" href="/src/styles/sorin-theme.css" />
</head>
<body class="usage-page-body">
  <div class="usage-page">
    <header class="usage-page-header">
      <h1>Usage Dashboard</h1>
      <div class="usage-page-actions">
        <button type="button" class="btn btn-ghost btn-sm" id="usage-refresh-btn">Refresh</button>
        <button type="button" class="btn btn-ghost btn-sm" id="usage-export-btn">Export JSON</button>
        <button type="button" class="btn btn-danger btn-sm" id="usage-reset-btn">Reset stats</button>
      </div>
    </header>
    <div id="usage-dashboard"></div>
  </div>
  <script type="module" src="/src/usage-main.js"></script>
</body>
</html>
