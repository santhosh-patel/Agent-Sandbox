<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shared Chat</title>
  <style>
    :root {
      --bg-primary: #faf6ed;
      --bg-elevated: #fffdf8;
      --accent: #6aab68;
      --accent-soft: rgba(168, 210, 166, 0.28);
      --text-primary: #3d3929;
      --text-secondary: #6b6656;
      --text-tertiary: #9a9587;
      --border: rgba(61, 57, 41, 0.09);
      --error: #d97070;
      --code-bg: #f3ead6;
      --pre-bg: #2c2a22;
      --pre-text: #f5f0e4;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1c1b16;
        --bg-elevated: #323028;
        --accent: #8fc98d;
        --accent-soft: rgba(143, 201, 141, 0.16);
        --text-primary: #f5f0e4;
        --text-secondary: #b8b2a4;
        --text-tertiary: #8a8478;
        --border: rgba(255, 248, 235, 0.08);
        --error: #e89292;
        --code-bg: #2c2a22;
        --pre-bg: #1c1b16;
        --pre-text: #f5f0e4;
      }
    }

    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      max-width: 720px;
      margin: 0 auto;
      padding: 24px;
      line-height: 1.6;
      color: var(--text-primary);
      background: var(--bg-primary);
    }

    h1 { font-size: 1.5rem; margin-bottom: 4px; }

    .meta {
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin-bottom: 24px;
    }

    .msg {
      margin-bottom: 20px;
      padding: 16px;
      border-radius: 14px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
    }

    .msg.user {
      background: var(--accent-soft);
      border-color: rgba(124, 184, 122, 0.35);
    }

    .msg-role {
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-tertiary);
      margin-bottom: 8px;
    }

    .msg img { max-width: 100%; border-radius: 8px; margin: 8px 0; }

    .msg pre {
      background: var(--pre-bg);
      color: var(--pre-text);
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
    }

    .msg code {
      background: var(--code-bg);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
    }

    .msg pre code { background: none; padding: 0; }

    .footer {
      margin-top: 32px;
      text-align: center;
      color: var(--text-tertiary);
      font-size: 0.8rem;
    }

    .error {
      color: var(--error);
      text-align: center;
      padding: 48px;
    }
  </style>
</head>
<body>
  <div id="content"><p class="error">Loading shared chat…</p></div>
  <script>
    function escapeHtml(text) {
      return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function renderMessage(msg, assistantName) {
      const role = msg.role === 'user' ? 'You' : (assistantName || 'Maya');
      let imgs = (msg.images || []).map(img => `<img src="${img.dataUrl}" alt="Image" />`).join('');
      const content = escapeHtml(msg.content || '').replace(/\n/g, '<br>');
      return `<div class="msg ${msg.role}"><div class="msg-role">${role}${msg.model ? ' · ' + escapeHtml(msg.model) : ''}</div>${imgs}<div>${content}</div></div>`;
    }
    try {
      const hash = location.hash.slice(1);
      if (!hash) throw new Error('No chat data in link');
      const data = JSON.parse(decodeURIComponent(escape(atob(hash))));
      const assistantName = data.assistantName || 'Maya';
      document.title = (data.title || 'Shared Chat') + ' · AI Playground';
      document.getElementById('content').innerHTML = `
        <h1>${escapeHtml(data.title || 'Shared Chat')}</h1>
        <p class="meta">Read-only · Exported ${new Date(data.exportedAt).toLocaleString()}</p>
        ${(data.messages || []).map(m => renderMessage(m, assistantName)).join('')}
        <p class="footer">Shared from AI Playground</p>
      `;
    } catch (e) {
      document.getElementById('content').innerHTML = `<p class="error">Could not load shared chat. The link may be invalid or truncated.</p>`;
    }
  </script>
</body>
</html>
